<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .municipio { transition: opacity 0.2s; }
        .municipio:hover { opacity: 0.7; stroke: #000; stroke-width: 1px; }

        /* Estilização da Tooltip */
        .tooltip {
            position: absolute;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #333;
            border-radius: 4px;
            pointer-events: none; /* Importante para não bugar o mouse */
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: #333;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="tooltip" class="tooltip" style="display: none;"></div>

    <script>
        const dataFromStreamlit = {}; 
        const geojson = {}; 

        const renderChart = () => {
            const width = 975;
            const height = 610;
            const tooltip = d3.select("#tooltip");

            const zoom = d3.zoom()
                .scaleExtent([1, 8])
                .on("zoom", zoomed);

            const svg = d3.create("svg")
                .attr("viewBox", [0, 0, width, height])
                .attr("width", width)
                .attr("height", height)
                .attr("style", "max-width: 100%; height: auto; background-color: #f8f9fa;")
                .on("click", reset);

            const projection = d3.geoMercator().fitSize([width, height], geojson);
            const path = d3.geoPath().projection(projection);

            const values = Object.values(dataFromStreamlit);
            const colorScale = d3.scaleSequential(d3.interpolateBlues)
                .domain([0, d3.max(values) || 10]);

            const g = svg.append("g");

            const municipios = g.append("g")
                .attr("cursor", "pointer")
                .selectAll("path")
                .data(geojson.features)
                .join("path")
                .attr("class", "municipio")
                .attr("fill", d => {
                    const val = dataFromStreamlit[d.properties.name] || 0;
                    return val > 0 ? colorScale(val) : "#ccc";
                })
                .attr("d", path)
                .on("click", clicked)
                // --- EVENTOS DA TOOLTIP ---
                .on("mouseover", function(event, d) {
                    const val = dataFromStreamlit[d.properties.name] || 0;
                    tooltip.style("display", "block")
                           .html(`<strong>${d.properties.name}</strong><br/>Valor: ${val}`);
                    d3.select(this).raise(); // Traz a borda para frente no hover
                })
                .on("mousemove", function(event) {
                    tooltip.style("top", (event.pageY + 15) + "px")
                           .style("left", (event.pageX + 15) + "px");
                })
                .on("mouseleave", function() {
                    tooltip.style("display", "none");
                });

            // Bordas fixas
            g.append("path")
                .attr("fill", "none")
                .attr("stroke", "white")
                .attr("stroke-width", 0.5)
                .attr("stroke-linejoin", "round")
                .attr("d", path(geojson))
                .style("pointer-events", "none");

            svg.call(zoom);

            function reset() {
                municipios.transition().duration(750).style("fill", d => {
                    const val = dataFromStreamlit[d.properties.name] || 0;
                    return val > 0 ? colorScale(val) : "#ccc";
                });
                svg.transition().duration(750).call(
                    zoom.transform,
                    d3.zoomIdentity,
                    d3.zoomTransform(svg.node()).invert([width / 2, height / 2])
                );
            }

            function clicked(event, d) {
                const [[x0, y0], [x1, y1]] = path.bounds(d);
                event.stopPropagation();
                
                municipios.transition().style("fill", null);
                d3.select(this).transition().duration(750).style("fill", "red");

                svg.transition().duration(750).call(
                    zoom.transform,
                    d3.zoomIdentity
                        .translate(width / 2, height / 2)
                        .scale(Math.min(8, 0.9 / Math.max((x1 - x0) / width, (y1 - y0) / height)))
                        .translate(-(x0 + x1) / 2, -(y0 + y1) / 2),
                    d3.pointer(event, svg.node())
                );
            }

            function zoomed(event) {
                const {transform} = event;
                g.attr("transform", transform);
                g.attr("stroke-width", 0.5 / transform.k);
            }

            return svg.node();
        }

        document.getElementById("map").appendChild(renderChart());
    </script>
</body>
</html>
